<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotina FBA · v2.0 Consolidado</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; width: 100vw; overflow: hidden; padding: 5px 10px; font-size: 11px; }
  .container { height: 100%; display: flex; flex-direction: column; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .title-block h1 { font-size: 18px; font-weight: 800; }
  .week-nav { display: flex; align-items: center; gap: 5px; background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 2px 8px; }
  .week-nav button { background: #334155; border: 1px solid #475569; color: #fff; cursor: pointer; font-size: 12px; padding: 1px 4px; border-radius: 3px; }
  .week-nav .week-label { font-weight: 700; font-size: 11px; min-width: 140px; text-align: center; }
  .progress-section { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 4px 10px; margin-bottom: 5px; }
  .progress-info { display: flex; justify-content: space-between; margin-bottom: 2px; font-size: 11px; font-weight: 700; }
  .progress-bar-bg { height: 6px; background: #0f172a; border-radius: 999px; overflow: hidden; border: 1px solid #334155; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #16a34a); width: 0%; transition: width 0.6s ease; }
  .quadro-geral { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; flex: 1; min-height: 0; }
  .col { background: #1e293b; border: 1px solid #334155; border-radius: 8px; display: flex; flex-direction: column; min-height: 0; padding: 5px; }
  .col.emergencial { background: rgba(239, 68, 68, 0.05); border-color: rgba(239, 68, 68, 0.3); }
  .col-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; padding-bottom: 4px; border-bottom: 1px solid #334155; flex-shrink: 0; }
  .col-header .name { font-size: 12px; font-weight: 800; }
  .col-header .plus-btn { background: #3b82f6; color: #fff; border: none; width: 18px; height: 18px; border-radius: 3px; cursor: pointer; font-weight: 900; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  
  /* AJUSTE DE ROLAGEM NAS COLUNAS */
  .task-list { 
    flex: 1; 
    overflow-y: auto; 
    padding-right: 4px; 
    padding-bottom: 80px; /* ESPAÇO DE SEGURANÇA PARA A ÚLTIMA TAREFA */
  }
  .task-list::-webkit-scrollbar { width: 4px; }
  .task-list::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.3); border-radius: 10px; }
  .task-list::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
  .task-list::-webkit-scrollbar-thumb:hover { background: #2563eb; }
  
  .task { 
    background: #0f172a; 
    border-radius: 6px; 
    padding: 5px; 
    margin-bottom: 4px; 
    border: 1px solid #1e293b; 
    position: relative; 
    transition: all 0.2s ease-in-out;
    z-index: 1;
  }
  .task:hover { 
    transform: scale(1.05); 
    z-index: 100; 
    box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
    border-color: #3b82f6;
    background: #1e293b;
  }
  .task:hover .task-text { font-size: 13px; color: #fff; }
  .task:hover .task-controls select, .task:hover .task-controls button { transform: scale(1.1); }

  .task.done { border-color: #22c55e; background: rgba(34, 197, 94, 0.05); }
  .task-text { font-size: 11px; font-weight: 700; color: #f8fafc; margin-bottom: 4px; white-space: pre-wrap; line-height: 1.2; transition: font-size 0.2s; }
  .farol { width: 14px; height: 14px; border-radius: 50%; cursor: pointer; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.2); }
  .farol[data-state="todo"] { background: #3b82f6; }
  .farol[data-state="doing"] { background: #fbbf24; animation: pulse 1.5s infinite; }
  .farol[data-state="done"] { background: #22c55e; }
  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }
  .task-controls { display: flex; gap: 3px; flex-wrap: wrap; align-items: center; }
  .resp-select, .prio-select { font-size: 8px; background: #1e293b; color: #fff; border: 1px solid #334155; padding: 1px 2px; border-radius: 2px; font-weight: 600; transition: transform 0.2s; }
  .prio-select[data-prio="Baixa"] { color: #60a5fa; border-color: #3b82f6; }
  .prio-select[data-prio="Média"] { color: #fbbf24; border-color: #d97706; }
  .prio-select[data-prio="Alta"] { color: #f87171; border-color: #ef4444; }
  .action-btn { background: #1e293b; border: 1px solid #475569; color: #fff; font-size: 8px; padding: 1px 3px; border-radius: 2px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
  .action-btn.active { border-color: #fbbf24; color: #fbbf24; }

  .clip-btn { border-color:#38bdf8; color:#7dd3fc; }
  .clip-btn.has-files { border-color:#22c55e; color:#86efac; background:rgba(34,197,94,.08); }
  .attach-list { margin-top:4px; display:flex; flex-direction:column; gap:2px; max-height:90px; overflow-y:auto; }
  .attach-title { font-size:8px; color:#7dd3fc; font-weight:800; margin:1px 0; }
  .attach-item { display:flex; align-items:center; gap:3px; background:#111827; border:1px solid #334155; border-radius:3px; padding:2px 3px; font-size:8px; }
  .attach-file-name { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#7dd3fc; font-size:8px; }
  .attach-mini { background:#0f172a; border:1px solid #334155; color:#cbd5e1; cursor:pointer; font-size:8px; border-radius:2px; padding:0 3px; flex-shrink:0; }
  .attach-mini:hover { border-color:#38bdf8; color:#e0f2fe; }
  .attach-mini.del { color:#f87171; border-color:rgba(248,113,113,.45); }
  .weekly-attachments-btn { background:#0f172a; border:1px solid #38bdf8; color:#7dd3fc; border-radius:999px; padding:3px 8px; font-size:10px; font-weight:800; cursor:pointer; }
  .weekly-attachments-btn:hover { background:rgba(56,189,248,.12); }
  .weekly-panel-backdrop { position:fixed; inset:0; background:rgba(2,6,23,.70); z-index:2000; display:none; }
  .weekly-panel-backdrop.open { display:block; }
  .weekly-panel { position:fixed; top:18px; right:18px; bottom:18px; width:min(520px, calc(100vw - 36px)); background:#0f172a; border:1px solid #334155; border-radius:12px; z-index:2001; display:none; flex-direction:column; box-shadow:0 24px 60px rgba(0,0,0,.55); }
  .weekly-panel.open { display:flex; }
  .weekly-panel-header { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px; border-bottom:1px solid #334155; }
  .weekly-panel-header h3 { font-size:14px; color:#e2e8f0; }
  .weekly-panel-header button { background:#1e293b; border:1px solid #475569; color:#fff; border-radius:6px; padding:4px 8px; cursor:pointer; }
  .weekly-panel-body { padding:10px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; }
  .weekly-att-card { border:1px solid #334155; border-radius:8px; padding:8px; background:#111827; }
  .weekly-att-meta { color:#94a3b8; font-size:10px; margin-bottom:5px; }
  .weekly-att-name { color:#e0f2fe; font-size:11px; font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-bottom:6px; }
  .weekly-att-actions { display:flex; gap:5px; flex-wrap:wrap; }
  .weekly-att-actions button { background:#0f172a; border:1px solid #334155; color:#cbd5e1; border-radius:4px; padding:3px 7px; font-size:10px; cursor:pointer; }
  .weekly-att-actions button:hover { border-color:#38bdf8; color:#e0f2fe; }
  .weekly-att-actions .del { color:#f87171; border-color:rgba(248,113,113,.45); }
  .col-actions { display:flex; gap:3px; align-items:center; }
  .day-attach-list { margin-bottom:4px; }
  .expand-area { margin-top: 4px; padding-top: 4px; border-top: 1px dashed #475569; display: none; }
  .expand-area.open { display: block; }
  .obs-textarea { width: 100%; background: #1e293b; border: 1px solid #475569; border-radius: 4px; padding: 6px; color: #f1f5f9; font-size: 10px; min-height: 34px; resize: vertical; outline: none; line-height:1.35; overflow:hidden; }
  .note-add-btn { background:#111827; border:1px dashed #64748b; color:#cbd5e1; border-radius:4px; padding:3px 6px; font-size:9px; font-weight:800; cursor:pointer; margin-top:5px; }
  .note-add-btn:hover { border-color:#fbbf24; color:#fde68a; }
  .obs-visible { margin-top:5px; border:1px solid #334155; border-radius:6px; background:rgba(15,23,42,.55); padding:5px; }
  .obs-visible.has-comment { border-color:rgba(251,191,36,.55); background:rgba(251,191,36,.05); }
  .obs-title { font-size:9px; color:#fbbf24; font-weight:900; margin-bottom:4px; display:flex; justify-content:space-between; gap:6px; }
  .add-task-box { margin-top: 5px; border: 1px solid #3b82f6; padding: 5px; border-radius: 4px; background: #0f172a; flex-shrink: 0; }
  .add-task-area { width: 100%; background: #1e293b; border: 1px solid #475569; border-radius: 3px; padding: 6px; color: #fff; font-size: 10px; min-height: 86px; resize: vertical; outline: none; margin-bottom: 4px; }
  .save-btn { background: #22c55e; color: #fff; border: none; padding: 2px 6px; border-radius: 3px; font-size: 9px; font-weight: 700; cursor: pointer; }
  #toast { position:fixed; bottom:15px; right:15px; padding:8px 15px; border-radius:6px; font-size:10px; font-weight:700; opacity:0; transition:0.3s; z-index:1000; color:#fff; }
  #toast.success { background:#22c55e; border:1px solid #16a34a; }
  #toast.error { background:#ef4444; border:1px solid #dc2626; }
  .rt-indicator { display:inline-flex; align-items:center; gap:5px; background:#1e293b; border:1px solid #334155; border-radius:999px; padding:3px 8px; font-size:10px; font-weight:800; color:#94a3b8; }
  .rt-dot { width:8px; height:8px; border-radius:50%; background:#64748b; }
  .rt-indicator.live { color:#4ade80; border-color:rgba(34,197,94,.45); }
  .rt-indicator.live .rt-dot { background:#22c55e; box-shadow:0 0 8px rgba(34,197,94,.7); animation:pulse 1.5s infinite; }
  .rt-indicator.error { color:#f87171; border-color:rgba(239,68,68,.45); }
  .rt-indicator.error .rt-dot { background:#ef4444; }
  .task.flash { animation: flashTask 1.2s ease; }
  @keyframes flashTask { 0% { background: rgba(59,130,246,.35); border-color:#60a5fa; } 100% { background:#0f172a; } }


  /* LOGIN SEGURO */
  .login-screen { position: fixed; inset: 0; background: radial-gradient(circle at top, #1e293b 0%, #0f172a 55%, #020617 100%); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-card { width: min(420px, 95vw); background:#111827; border:1px solid #334155; border-radius:16px; padding:24px; box-shadow:0 24px 80px rgba(0,0,0,.55); }
  .login-card h2 { font-size:22px; margin-bottom:6px; color:#f8fafc; }
  .login-card p { color:#94a3b8; font-size:12px; margin-bottom:18px; line-height:1.4; }
  .login-card label { display:block; color:#cbd5e1; font-size:11px; font-weight:800; margin:10px 0 5px; }
  .login-card input { width:100%; background:#0f172a; border:1px solid #334155; border-radius:8px; color:#f8fafc; padding:10px; outline:none; font-size:13px; }
  .login-card input:focus { border-color:#38bdf8; box-shadow:0 0 0 3px rgba(56,189,248,.12); }
  .login-btn { margin-top:16px; width:100%; border:none; border-radius:8px; background:#2563eb; color:white; padding:11px; font-weight:900; cursor:pointer; }
  .login-btn:hover { background:#1d4ed8; }
  .login-error { margin-top:10px; color:#f87171; font-size:11px; min-height:16px; }
  .user-chip { display:inline-flex; align-items:center; gap:6px; background:#0f172a; border:1px solid #334155; color:#cbd5e1; border-radius:999px; padding:3px 8px; font-size:10px; font-weight:800; }
  .logout-btn { background:#1e293b; border:1px solid #475569; color:#fff; border-radius:999px; padding:3px 8px; font-size:10px; font-weight:800; cursor:pointer; }
  .logout-btn:hover { border-color:#f87171; color:#fecaca; }
  .delete-task-btn { color:#f87171; border-color:rgba(248,113,113,.55); }
  .delete-task-btn:hover { background:rgba(239,68,68,.12); color:#fecaca; }
  .edit-title-btn { border-color:rgba(251,191,36,.55); color:#fde68a; }
  .edit-title-btn:hover { background:rgba(251,191,36,.12); color:#fff7ed; }
  .reset-title-btn { border-color:rgba(148,163,184,.55); color:#cbd5e1; }
  .title-edited-badge { font-size:8px; color:#fde68a; margin-left:3px; font-weight:800; }

  .task-audit { font-size:8px; color:#94a3b8; margin-top:4px; display:flex; flex-wrap:wrap; gap:5px; }
  .shipment-panel { background:rgba(59,130,246,.07); border:1px solid rgba(59,130,246,.35); border-radius:7px; padding:5px; margin-bottom:6px; flex-shrink:0; }
  .shipment-title { display:flex; justify-content:space-between; align-items:center; gap:4px; color:#bfdbfe; font-size:10px; font-weight:900; margin-bottom:4px; }
  .shipment-card { background:#0f172a; border:1px solid #334155; border-radius:6px; padding:5px; margin-top:5px; }
  .shipment-card-header { display:flex; align-items:center; justify-content:space-between; gap:4px; margin-bottom:4px; }
  .shipment-card-header strong { font-size:9px; color:#e0f2fe; }
  .shipment-card-headline { display:flex; align-items:center; gap:5px; min-width:0; flex:1; }
  .shipment-toggle { background:#111827; border:1px solid #38bdf8; color:#7dd3fc; border-radius:999px; width:20px; height:20px; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; font-size:11px; font-weight:900; flex-shrink:0; }
  .shipment-summary { color:#cbd5e1; font-size:8px; font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .shipment-body { display:none; margin-top:4px; }
  .shipment-card.open .shipment-body { display:block; }
  .shipment-footer-toggle { width:100%; margin-top:6px; background:#111827; border:1px dashed #38bdf8; color:#7dd3fc; border-radius:5px; padding:3px; font-size:9px; font-weight:900; cursor:pointer; }
  .shipment-row { display:grid; grid-template-columns: 44px 46px minmax(110px,1fr); gap:4px; align-items:start; margin-top:5px; }
  .shipment-row label { font-size:8px; color:#94a3b8; font-weight:800; }
  .shipment-input { width:100%; background:#1e293b; border:1px solid #475569; color:#fff; border-radius:3px; padding:4px; font-size:10px; outline:none; }
  .shipment-product { min-height:42px; resize:vertical; line-height:1.3; overflow:hidden; white-space:pre-wrap; }
  .shipment-input:focus { border-color:#38bdf8; }
  .shipment-date { display:flex; align-items:center; gap:3px; margin-bottom:4px; }
  .shipment-date span { font-size:8px; color:#94a3b8; font-weight:800; }
  .shipment-actions { display:flex; gap:3px; flex-wrap:wrap; margin-top:5px; }
  .shipment-small-btn { background:#111827; border:1px solid #475569; color:#e2e8f0; border-radius:3px; padding:2px 4px; font-size:8px; font-weight:800; cursor:pointer; }
  .shipment-small-btn:hover { border-color:#38bdf8; }
  .shipment-small-btn.del { color:#fca5a5; border-color:rgba(248,113,113,.45); }
  .shipment-empty { color:#94a3b8; font-size:9px; padding:3px 0; }


  /* V2.0 · Correio interno e navegação rápida */
  .mail-btn { background:#0f172a; border:1px solid #fbbf24; color:#fde68a; border-radius:999px; padding:3px 8px; font-size:10px; font-weight:900; cursor:pointer; position:relative; }
  .mail-btn:hover { background:rgba(251,191,36,.12); }
  .mail-btn.has-unread { animation: mailPulse 1.4s infinite; border-color:#f59e0b; color:#fff7ed; }
  @keyframes mailPulse { 0%,100% { box-shadow:0 0 0 rgba(251,191,36,0); } 50% { box-shadow:0 0 12px rgba(251,191,36,.55); } }
  .mail-panel-backdrop { position:fixed; inset:0; background:rgba(2,6,23,.72); z-index:3000; display:none; }
  .mail-panel-backdrop.open { display:block; }
  .mail-panel { position:fixed; top:18px; right:18px; bottom:18px; width:min(560px, calc(100vw - 36px)); background:#0f172a; border:1px solid #334155; border-radius:12px; z-index:3001; display:none; flex-direction:column; box-shadow:0 24px 60px rgba(0,0,0,.6); }
  .mail-panel.open { display:flex; }
  .mail-header { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px; border-bottom:1px solid #334155; }
  .mail-header h3 { font-size:14px; color:#e2e8f0; }
  .mail-header button { background:#1e293b; border:1px solid #475569; color:#fff; border-radius:6px; padding:4px 8px; cursor:pointer; }
  .mail-compose { padding:10px; border-bottom:1px solid #334155; background:#111827; }
  .mail-compose-row { display:flex; gap:6px; align-items:center; margin-bottom:6px; }
  .mail-compose select, .mail-compose textarea { background:#0f172a; border:1px solid #334155; color:#e2e8f0; border-radius:6px; padding:7px; font-size:11px; outline:none; }
  .mail-compose select { width:150px; }
  .mail-compose textarea { width:100%; min-height:70px; resize:vertical; }
  .mail-compose button { background:#2563eb; border:none; color:#fff; border-radius:6px; padding:6px 10px; font-size:11px; font-weight:900; cursor:pointer; }
  .mail-body { padding:10px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; }
  .mail-card { border:1px solid #334155; background:#111827; border-radius:8px; padding:8px; }
  .mail-card.unread { border-color:#f59e0b; background:rgba(251,191,36,.06); }
  .mail-meta { font-size:9px; color:#94a3b8; display:flex; justify-content:space-between; gap:8px; margin-bottom:5px; flex-wrap:wrap; }
  .mail-text { font-size:11px; color:#e2e8f0; white-space:pre-wrap; line-height:1.35; }
  .mail-actions { display:flex; gap:5px; margin-top:7px; flex-wrap:wrap; }
  .mail-actions button { background:#0f172a; border:1px solid #334155; color:#cbd5e1; border-radius:4px; padding:3px 7px; font-size:10px; cursor:pointer; }
  .mail-actions button:hover { border-color:#38bdf8; color:#e0f2fe; }
  .mail-actions .del { color:#f87171; border-color:rgba(248,113,113,.45); }
  .day-nav-strip { display:grid; grid-template-columns: 1fr 1fr; gap:4px; margin:0 0 5px 0; flex-shrink:0; }
  .day-nav-btn { background:#0f172a; border:1px solid #38bdf8; color:#e0f2fe; border-radius:6px; padding:4px 3px; font-size:9px; font-weight:900; cursor:pointer; box-shadow:0 0 0 1px rgba(56,189,248,.08) inset; }
  .day-nav-btn:hover { background:rgba(56,189,248,.14); border-color:#7dd3fc; color:#fff; }
  .day-nav-btn:active { transform:scale(.98); }
  .day-count { color:#94a3b8; font-size:10px; font-weight:800; margin-left:3px; }



  /* V2.3: Planilhas e Estoque */
  .sheet-panel, .inventory-panel { background:rgba(59,130,246,.06); border:1px solid rgba(59,130,246,.35); border-radius:7px; padding:5px; margin:6px 0; }
  .sheet-title, .inventory-title { display:flex; justify-content:space-between; align-items:center; gap:4px; color:#bfdbfe; font-size:10px; font-weight:900; margin-bottom:4px; }
  .sheet-item { display:flex; align-items:center; gap:4px; background:#0f172a; border:1px solid #334155; border-radius:5px; padding:4px; margin-top:4px; font-size:9px; }
  .sheet-item a { color:#7dd3fc; font-weight:900; text-decoration:none; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .sheet-empty { color:#94a3b8; font-size:9px; padding:3px; }
  .inventory-toggle { width:100%; background:#111827; border:1px solid #38bdf8; color:#7dd3fc; border-radius:5px; padding:4px; font-size:9px; font-weight:900; cursor:pointer; margin:5px 0; }
  .inventory-body { display:none; margin-top:5px; max-height:260px; overflow:auto; padding-right:2px; }
  .inventory-panel.open .inventory-body { display:block; }
  .inventory-row, .inventory-head { display:grid; grid-template-columns: minmax(120px, 1.5fr) 52px 52px 40px; gap:4px; align-items:center; margin-top:3px; }
  .inventory-head { color:#fde68a; font-size:8px; font-weight:900; }
  .inventory-input { width:100%; background:#1e293b; border:1px solid #475569; color:#fff; border-radius:3px; padding:4px; font-size:9px; outline:none; }
  .inventory-input:focus { border-color:#38bdf8; }
  .inventory-actions { display:flex; gap:3px; align-items:center; justify-content:center; }
  .inventory-mini-btn { background:#f8fafc; border:1px solid #cbd5e1; color:#0f172a; cursor:pointer; font-size:8px; border-radius:4px; padding:4px 5px; font-weight:800; }
  .inventory-mini-btn:hover { border-color:#38bdf8; color:#075985; }

  function calcRows(text, minRows = 2, maxRows = 12, charsPerLine = 38) {
    const value = String(text || '');
    if (!value.trim()) return minRows;
    const lines = value.split('\n');
    const visualRows = lines.reduce((sum, line) => sum + Math.max(1, Math.ceil(line.length / charsPerLine)), 0);
    return Math.max(minRows, Math.min(maxRows, visualRows));
  }

  function applyRemoteState(row) {
    if (!row || !row.task_id) return;
    if (row.week_start !== currentWeekISO()) return;
    if (Date.now() - lastLocalWriteAt < 900) return;
    if (focusedId || activeInputs.size > 0) return;

    if (realtimeChannel) supabase.removeChannel(realtimeChannel);
    setRealtimeStatus('', 'Conectando...');
    realtimeChannel = supabase
      .channel('rotina-fba-live')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'routine_task_states' }, payload => {
        if (payload.eventType === 'DELETE') {
          if (payload.old?.week_start === currentWeekISO()) {
            delete weekStates[payload.old.task_id];
            render();
          }
          return;
        }
        applyRemoteState(payload.new);
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'routine_tasks' }, () => applyRemoteTemplateChange())
      .on('postgres_changes', { event: '*', schema: 'public', table: 'routine_attachments' }, payload => {
        if (payload.new?.week_start === currentWeekISO() || payload.old?.week_start === currentWeekISO()) loadData();
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'routine_shipments' }, payload => {
        if (payload.new?.week_start === currentWeekISO() || payload.old?.week_start === currentWeekISO()) loadData();
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'routine_messages' }, () => loadMessages())
      .on('postgres_changes', { event: '*', schema: 'public', table: 'routine_permanent_spreadsheets' }, () => loadData())
      .on('postgres_changes', { event: '*', schema: 'public', table: 'routine_inventory_counts' }, payload => { if (payload.new?.week_start === currentWeekISO() || payload.old?.week_start === currentWeekISO()) loadData(); })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'routine_active_products' }, () => loadData())
      .subscribe(status => {

  async function loadData(options = {}) {
    const isAuto = !!options.auto;
    if (isEditingField()) return;
    const scrollPositions = captureScrollPositions();
    const iso = formatDateISO(currentWeekStart);
    document.getElementById('weekLabel').textContent = `${formatDateBR(currentWeekStart)} — ${formatDateBR(new Date(currentWeekStart.getTime() + 6*24*60*60*1000))}`;
    const [t, s, a, sh, sheets, inv, products, excl, titleOv] = await Promise.all([
      supabase.from('routine_tasks').select('*'),
      supabase.from('routine_task_states').select('*').eq('week_start', iso),
      supabase.from('routine_attachments').select('*').eq('week_start', iso).order('created_at', { ascending: true }),
      supabase.from('routine_shipments').select('*').eq('week_start', iso).order('created_at', { ascending: true }).range(0, 9999),
      supabase.from('routine_permanent_spreadsheets').select('*').is('deleted_at', null).order('position', { ascending: true }).order('created_at', { ascending: true }),
      supabase.from('routine_inventory_counts').select('*').eq('week_start', iso).order('position', { ascending: true }),
      supabase.from('routine_active_products').select('*').order('position', { ascending: true }),
      supabase.from('routine_task_exclusions').select('*').lte('from_week_start', iso),
      supabase.from('routine_task_title_overrides').select('*').lte('from_week_start', iso).order('from_week_start', { ascending: true })
    ]);
    if (t.error || s.error || a.error || sh.error || sheets.error || inv.error || products.error || excl.error || titleOv.error) {
      showToast('Erro ao carregar dados', 'error');
      console.error('Supabase load error:', t.error || s.error || a.error || sh.error || sheets.error || inv.error || products.error || excl.error || titleOv.error);
      return;
    }
    const rawTasks = t.data || [];
    // Regra v2.8 - semanas limpas:
    // - tarefas padrão/template aparecem em toda semana;
    // - tarefas manuais aparecem somente na semana em que foram criadas;
    // - observações, anexos, status, responsável e histórico são carregados SOMENTE da semana aberta;
    // - semanas anteriores não são alteradas ao editar a semana atual;
    // - exclusão de tarefa padrão vale desta semana em diante.
    allTasks = rawTasks.filter(taskBelongsToCurrentWeek);
    weekStates = {}; (s.data || []).forEach(row => weekStates[row.task_id] = row);
    taskTitleOverrides = {};
    (titleOv.data || []).forEach(row => {
      if (row && row.task_id && row.task_title_override) taskTitleOverrides[String(row.task_id)] = row;
    });
    taskExclusions = excl.data || [];
    const excludedTaskIds = new Set(taskExclusions.map(x => String(x.task_id)));
    allTasks = allTasks.filter(t => !excludedTaskIds.has(String(t.id)));
    allTasks = allTasks.filter(t => !isExcludedTaskName(t));
    shipments = sh.data || [];
    sheetLinks = sheets.data || [];
    inventoryRows = inv.data || [];
    activeProducts = (products.data || []).filter(p => !p.deleted_at);
    attachments = {};
    (a.data || []).forEach(row => {
      const key = row.scope_type === 'task' ? attKey('task', row.task_id) : attKey('day', row.day_code);
      if (!attachments[key]) attachments[key] = [];
      attachments[key].push(row);
    });
    render();
    if (weeklyPanelOpen) renderWeeklyAttachmentsPanel();
    setTimeout(() => document.querySelectorAll('textarea.obs-textarea, textarea.shipment-product').forEach(window.RotinaFBA.autoGrow), 0);
    restoreScrollPositions(scrollPositions);
  }

  async function upsert(taskId, patch) {
    const iso = formatDateISO(currentWeekStart);
    const payload = {
      week_start: iso,
      task_id: taskId,
      ...patch,
      updated_at: new Date().toISOString(),
      updated_by_email: currentUser?.email || null
    };
    if (!weekStates[taskId]?.created_by_email) payload.created_by_email = currentUser?.email || null;
    lastLocalWriteAt = Date.now();
    const { error } = await supabase.from('routine_task_states').upsert(payload, { onConflict: 'week_start,task_id', returning: 'minimal' });
    if (error) {
      showToast('Erro técnico ao salvar', 'error');
      console.error('Supabase save error:', error);
    } else { 
      weekStates[taskId] = { ...weekStates[taskId], ...patch }; 
      showToast('Salvo com sucesso!');
      updateProgress(); 
    }
  }

  async function uploadFiles(scopeType, ref, files) {
    const iso = currentWeekISO();
    if (!files.length) return;
    showToast(`Enviando ${files.length} anexo(s)...`);
    for (const file of files) {
      const id = (crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now()) + '-' + Math.random().toString(16).slice(2);
      const scopeFolder = scopeType === 'task' ? `task-${ref}` : `day-${ref}`;
      const filePath = `${iso}/${scopeFolder}/${id}-${safeFileName(file.name)}`;
      const { error: uploadError } = await supabase.storage
        .from(ATTACH_BUCKET)
        .upload(filePath, file, { cacheControl: '3600', upsert: false, contentType: file.type || 'application/octet-stream' });
      if (uploadError) {
        showToast(`Erro ao anexar: ${file.name}`, 'error');
        console.error('Upload error:', uploadError);
        continue;
      }
      const row = {
        week_start: iso,
        scope_type: scopeType,
        task_id: scopeType === 'task' ? String(ref) : null,
        day_code: scopeType === 'day' ? String(ref) : null,
        file_name: file.name,
        file_path: filePath,
        file_size: file.size,
        mime_type: file.type || null,
        uploaded_by_email: currentUser?.email || null
      };
      const { error: insertError } = await supabase.from('routine_attachments').insert(row);
      if (insertError) {
        showToast(`Erro ao registrar anexo: ${file.name}`, 'error');
        console.error('Attachment row error:', insertError);
      }
    }
    showToast('Anexo(s) enviado(s)');
    loadData();
  }

  function emptyBox(n) {
    return { box_number: n, quantity: '', product: '' };
  }

  function normalizeBoxes(boxes) {
    const arr = Array.isArray(boxes) && boxes.length ? boxes : [emptyBox(1)];
    return arr.map((b, idx) => ({
      box_number: idx + 1,
      quantity: b?.quantity ?? '',
      product: b?.product ?? ''
    }));
  }


  function saveOpenShipments() {
    localStorage.setItem('rotina_fba_open_shipments', JSON.stringify([...openShipments]));
  }

  function shipmentTotalUnits(boxes) {
    return normalizeBoxes(boxes).reduce((sum, b) => {
      const raw = String(b.quantity || '').replace(/\./g, '').replace(',', '.');
      const n = Number(raw);
      return sum + (Number.isFinite(n) ? n : 0);
    }, 0);
  }

  function shipmentSummary(sh, sidx, boxes) {
    const date = sh.shipment_date ? sh.shipment_date : 'sem data';
    const total = shipmentTotalUnits(boxes);
    const caixaLabel = boxes.length === 1 ? '1 caixa' : `${boxes.length} caixas`;
    const totalLabel = total ? ` · ${total} un` : '';
    return `Envio ${sidx + 1} — ${date} — ${caixaLabel}${totalLabel}`;
  }

    const boxes = normalizeBoxes(sh.boxes);

    if (boxes.length <= 1) {
      showToast('O envio precisa manter pelo menos a Caixa 1.', 'error');
      return;
    }

    if (!confirm('Excluir esta caixa do envio?')) return;

    boxes.splice(Number(boxIndex), 1);

    const renumbered = boxes.map((box, idx) => ({
      ...box,
      box_number: idx + 1
    }));

    sh.boxes = renumbered;
    openShipments.add(id);

    await updateShipment(shipmentId, { boxes: renumbered });

  window.RotinaFBA.saveTask = async function(dayCode, btn) {
    const text = btn.parentElement.parentElement.querySelector('textarea').value;
    if (!text.trim()) return;
    const iso = currentWeekISO();

    // v1.7.1: tarefas criadas manualmente ficam presas à semana atual.
    // Elas NÃO entram no modelo fixo da rotina e NÃO aparecem nas semanas futuras.
    const newTask = {
      id: 'custom-' + Date.now() + '-' + Math.random().toString(16).slice(2, 8),
      day_code: dayCode,
      task_text: text.trim(),
      block_name: dayCode === 'EMERGENCIAL' ? 'Central Operacional' : 'Tarefas adicionais',
      is_manual: true,
      week_start: iso,
      created_by_email: currentUser?.email || null,
      deleted_at: null
    };

    const { data, error } = await supabase.from('routine_tasks').insert(newTask).select().single();
    if (error) {
      showToast('Erro ao criar tarefa: ' + (error.message || 'ver console'), 'error');
      console.error('Create task error:', error);
    } else { 
      allTasks.push(data); 
      window.RotinaFBA.removeInput(dayCode, btn);
      showToast('Tarefa criada nesta semana.');
      render(); 
    }
  };

  window.RotinaFBA.deleteTask = async function(taskId) {
    const task = getTaskById(taskId);
    if (!task) return;
    const msg = isManualTask(task)
      ? 'Excluir esta tarefa desta semana?'
      : 'Excluir esta tarefa desta semana e das próximas semanas? As semanas anteriores serão preservadas.';
    if (!confirm(msg)) return;
    const iso = currentWeekISO();

    // Para tarefas padrão: cria um bloqueio a partir da semana atual.
    // Isso preserva semanas anteriores e oculta esta tarefa nas semanas futuras.
    const exclusionRow = {
      task_id: String(taskId),
      from_week_start: iso,
      created_by_email: currentUser?.email || null
    };
    const { error: exclusionError } = await supabase.from('routine_task_exclusions').upsert(exclusionRow, { onConflict: 'task_id,from_week_start' });

    // Limpa dados somente da semana atual para não deixar anexos/estado órfãos visíveis.
    const taskFiles = getAttachments('task', taskId);
    if (taskFiles.length) {
      const paths = taskFiles.map(a => a.file_path).filter(Boolean);
      if (paths.length) await supabase.storage.from(ATTACH_BUCKET).remove(paths);
    }
    const { error: attError } = await supabase.from('routine_attachments').delete().eq('week_start', iso).eq('task_id', String(taskId));
    const { error: stateError } = await supabase.from('routine_task_states').delete().eq('week_start', iso).eq('task_id', String(taskId));

    if (exclusionError || attError || stateError) {
      showToast('Erro ao excluir tarefa', 'error');
      console.error('Delete task error:', exclusionError || attError || stateError);
      return;
    }
    showToast(isManualTask(task) ? 'Tarefa excluída desta semana.' : 'Tarefa excluída desta semana e das próximas.');
    await loadData();
  };

  window.RotinaFBA.editTaskTitle = async function(taskId) {
    const task = getTaskById(taskId);
    if (!task) return;
    const st = weekStates[taskId] || {};
    const currentTitle = taskTitleOverrides[String(taskId)]?.task_title_override || st.task_title_override || task.task_text || '';
    const novo = prompt('Editar nome da tarefa desta semana em diante:', currentTitle);
    if (novo === null) return;
    const clean = String(novo).trim();
    if (!clean) {
      showToast('O nome da tarefa não pode ficar vazio.', 'error');
      return;
    }
    const payload = {
      task_id: String(taskId),
      from_week_start: currentWeekISO(),
      task_title_override: clean,
      updated_by_email: currentUser?.email || null,
      updated_at: new Date().toISOString()
    };
    const { error } = await supabase
      .from('routine_task_title_overrides')
      .upsert(payload, { onConflict: 'task_id,from_week_start' });
    if (error) {
      showToast('Erro ao renomear tarefa', 'error');
      console.error('Title override error:', error);
      return;
    }
    taskTitleOverrides[String(taskId)] = payload;
    showToast('Nome alterado desta semana em diante');
    await loadData();
  };

  window.RotinaFBA.resetTaskTitle = async function(taskId) {
    if (!confirm('Restaurar o nome original desta tarefa nesta semana?')) return;
    await upsert(taskId, { task_title_override: null });
    weekStates[taskId] = { ...weekStates[taskId], task_title_override: null };
    render();
  };

  window.RotinaFBA.cycleFarol = (taskId) => {
    const current = weekStates[taskId]?.status || 'todo';
    const nextStatus = current === 'todo' ? 'doing' : (current === 'doing' ? 'done' : 'todo');
    const done = nextStatus === 'done';
    const completedAt = done ? new Date().toISOString() : null;
    weekStates[taskId] = { ...weekStates[taskId], status: nextStatus, done, completed_at: completedAt };
    updateProgress(); render(); upsert(taskId, { status: nextStatus, done, completed_at: completedAt });
  };

  function updateProgress() {
    const total = allTasks.length;
    const done = Object.values(weekStates).filter(s => s.status === 'done').length;
    const pct = total ? Math.round((done/total)*100) : 0;
    document.getElementById('progressLabel').textContent = `${done}/${total} (${pct}%)`;
    document.getElementById('progressBar').style.width = `${pct}%`;
  }


  function inventoryRowsForRender() {
    const defaultLen = DEFAULT_INVENTORY_PRODUCTS.length;
    const byPos = new Map((inventoryRows || []).map(r => [Number(r.position), r]));
    const defaults = DEFAULT_INVENTORY_PRODUCTS.map((name, idx) => {
      const pos = idx + 1;
      const saved = byPos.get(pos) || {};
      if (saved.deleted_at) return null;
      return {
        position: pos,
        product_name: saved.product_name ?? name,
        stock_amazon: saved.stock_amazon ?? '',
        stock_internal: saved.stock_internal ?? '',
        deleted_at: saved.deleted_at || null
      };
    }).filter(Boolean);
    const extras = (inventoryRows || [])
      .filter(r => Number(r.position) > defaultLen && !r.deleted_at)
      .sort((a,b) => Number(a.position) - Number(b.position))
      .map(r => ({
        position: Number(r.position),
        product_name: r.product_name ?? '',
        stock_amazon: r.stock_amazon ?? '',
        stock_internal: r.stock_internal ?? '',
        deleted_at: r.deleted_at || null
      }));
    return [...defaults, ...extras];
  }

  async function upsertInventoryRow(row) {
    const payload = {
      week_start: currentWeekISO(),
      position: Number(row.position),
      product_name: row.product_name || '',
      stock_amazon: row.stock_amazon || '',
      stock_internal: row.stock_internal || '',
      deleted_at: row.deleted_at || null,
      updated_by_email: currentUser?.email || null,
      updated_at: new Date().toISOString()
    };
    const { error } = await supabase.from('routine_inventory_counts').upsert(payload, { onConflict: 'week_start,position' });
    if (error) {
      showToast('Erro ao salvar estoque', 'error');
      console.error('Inventory save error:', error);
      return false;
    }
    const existing = inventoryRows.find(r => Number(r.position) === Number(row.position));
    if (existing) Object.assign(existing, payload); else inventoryRows.push(payload);
    return true;
  }

    if (!isSpreadsheetFile(file)) {
      showToast('Use arquivo Excel, CSV ou ODS.', 'error');
      return;
    }

    const title = prompt('Nome da planilha permanente:', file.name.replace(/\.(xlsx|xls|csv|ods)$/i, ''));
    if (!title || !title.trim()) return;

    showToast('Enviando planilha...');

    if (!filePath) return;

    const nextPosition = (sheetLinks || []).length + 1;
    const row = {
      title: title.trim(),
      file_name: file.name,
      file_path: filePath,
      file_size: file.size,
      mime_type: file.type || null,
      version: 1,
      position: nextPosition,
      created_by_email: normalizeEmail(currentUser?.email),
      updated_by_email: normalizeEmail(currentUser?.email),

      showToast('Substituindo planilha...');
      const filePath = await uploadPermanentSpreadsheetFile(file, sheet.file_path);
      if (!filePath) return;

      const { error } = await supabase
        .from('routine_permanent_spreadsheets')
        .update({
          file_name: file.name,
          file_path: filePath,
          file_size: file.size,
          mime_type: file.type || null,
          version: Number(sheet.version || 1) + 1,
          updated_by_email: normalizeEmail(currentUser?.email),
          updated_at: new Date().toISOString()
        })
        .eq('id', id);

      if (error) {
        showToast('Erro ao substituir planilha', 'error');

    updateProgress();
    const countEl = document.getElementById('weeklyAttachCount');
    if (countEl) countEl.textContent = String(allWeekAttachments().length);
    if (weeklyPanelOpen) renderWeeklyAttachmentsPanel();
    setTimeout(() => document.querySelectorAll('textarea.obs-textarea, textarea.shipment-product').forEach(window.RotinaFBA.autoGrow), 0);
  }


  document.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' && document.getElementById('loginScreen')?.style.display !== 'none') {
      window.RotinaFBA.login();
    }
  });

  async function initAuth() {
    const { data } = await supabase.auth.getSession();
    const user = data?.session?.user;
    if (user && ALLOWED_EMAILS.includes(normalizeEmail(user.email))) {
      await showAppForUser(user);
    } else {
      if (user) await supabase.auth.signOut();
      showLoginScreen();
    }
  }

  initAuth();
  // Atualização de segurança: mantém sync mesmo se o navegador derrubar o canal realtime.
  setInterval(() => { if (currentUser && !isEditingField()) loadData({ auto: true }); }, 45000);
</script>
</body>
</html>
